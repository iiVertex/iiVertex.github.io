<!DOCTYPE html>
<style>
body {
    font-size: 16px;
    font-family:'Trebuchet MS';
    color: #fff;
    background: black;
}
.spc {
    display: flex;
    justify-content: space-between;
}
.spc img{
    width: 20%;
    height: 20%;
}
.container {
    width: 90%;
    margin: auto;
    overflow: hidden;
}
.title {
    padding: 0;
    margin-left: 0;
    margin-right: 0;
}
.header {
    font-size: 15px;
    color: #fff;
    padding: 0;
    margin: 0;
    margin-top: 30px;
}
#navbar {
    color: #fff;
    display: flex;
    justify-content: center;
    padding: 30px;
}

#navbar ul{
    padding: 0;
    list-style: none;
    margin-top: 0;
}
#navbar ul li{
    display: inline;
    font-size: 12px;
    padding-right: 15px;
}
#navbar ul li a{
    text-decoration: none;
    color: #fff;
}
#navbar ul li a:hover{
    color: lightblue;
}
.lgbtq {
    margin-top: 30px;
}
.lgbtq:hover {
    background-color: grey;
}
.top-sec {
    padding: 10px;
    color:#fff;
}
.imgg {
    width: 20%;
}
.skills {
    margin-top: 50px;
}
.space {
    display: flex;
    justify-content: space-around;
}
.idk {
    text-align: center;
    font-size: 20px;
}
.boxes .box{
    float: left;
    width: 33%;
    font-size: 10px;
    text-align: center;
    margin-bottom: 10%;
}
.boxes img{
    width: 100px;
}
#Contact {
    clear: both;
}
#Contact h1{
    font-size: 20px;
}
.oo {
    text-align: center;
}
@media(max-width: 400px){
    #navbar, .title, .lgbtq{
        float: none;
        text-align: center;
        font-size: 8px;
        
    }
    .imgg {
        width: 60%;
    }
    .top-sec{
        margin-left: 10%;
    }
    .boxes, .boxes .box, .p{
        margin: auto;
        float: none;
        margin-bottom: 10px;
    }
    .wi, .wo {
        width: 100%;
    }
}
</style>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="profile.css">
    <title>Personal Profile Project</title>
</head>
<body>
    <div class="container">
        <div class="spc">
            <div class="title">
                <h1 class="header">Vertex Portfolio</h1>
            </div>
                <nav id="navbar">
                    <ul>
                        <li><a href="#Home">Home</a></li>
                        <li><a href="#Skills">Skills</a></li>
                        <li><a href="#Contact">Contact</a></li>
                    </ul>
                </nav>
                <form>
                    <button class="lgbtq" type="button">
                        Email Us!
                    </button>
                </form>
        </div>
            <section id="Home">
                <div class="space">
                    <div class="top-sec">
                        <h1>Welcome, I am Vertex.</h1>
                        <p>A Professional Web Developer!</p>
                    </div>
                    <img class="imgg" src="./images/024c806f7893f3e6aa0e72b5b9637795.png">
                </div>
            </section>
            <section class="skills" id="Skills">
                <h1 class="idk">Here are some of technical skills:</h1>
                <div class="boxes">
                    <div class="box">
                        <img class="qe" src="./images/valorant-logo-FAB2CA0E55-seeklogo.com.png">
                        <p class="p">I am a diamond one player</p>
                    </div>
                    <div class="box">
                        <img class="qe" src="./images/lggg.png">
                        <p class="p">I am very good at HTML5.</p>
                    </div>
                    <div class="box">
                        <img class="qe" src="./images/sfsdfdsfds.png">
                        <p class="p">Great CSS Experience</p>
                    </div>
                </div>
            </section>
            <footer id="Contact">
                <div class="oo">
                    <h1>Wanna Talk?</h1>
                    <p>Email Us</p>
                    <form>
                        <input type="email" class="wo" placeholder="Enter your Email Here">
                        <button type="sumbit" class="wi">Submit</button>
                    </form>
                </div>
            </footer>
    </div>
</body>
</html>
